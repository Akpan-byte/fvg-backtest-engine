name: FVG D-Only Futures 10-Year Backtest Retry

on:
  workflow_dispatch:

jobs:
  donly-retry:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 24
      matrix:
        include:
          # ES missing years (2016-2024); ES_Donly_chunk4 covers 2024-12 -> 2026-12
          - symbol: ES
            chunk: 1
            start: "2016-01-01T00:00:00"
            end: "2016-12-31T23:59:59"
          - symbol: ES
            chunk: 2
            start: "2016-12-01T00:00:00"
            end: "2017-12-31T23:59:59"
          - symbol: ES
            chunk: 3
            start: "2017-12-01T00:00:00"
            end: "2018-12-31T23:59:59"
          - symbol: ES
            chunk: 4
            start: "2018-12-01T00:00:00"
            end: "2019-12-31T23:59:59"
          - symbol: ES
            chunk: 5
            start: "2019-12-01T00:00:00"
            end: "2020-12-31T23:59:59"
          - symbol: ES
            chunk: 6
            start: "2020-12-01T00:00:00"
            end: "2021-12-31T23:59:59"
          - symbol: ES
            chunk: 7
            start: "2021-12-01T00:00:00"
            end: "2022-12-31T23:59:59"
          - symbol: ES
            chunk: 8
            start: "2022-12-01T00:00:00"
            end: "2023-12-31T23:59:59"
          - symbol: ES
            chunk: 9
            start: "2023-12-01T00:00:00"
            end: "2024-12-31T23:59:59"
          # NQ missing years (2016-2024); NQ_Donly_chunk4 covers 2024-12 -> 2026-12
          - symbol: NQ
            chunk: 1
            start: "2016-01-01T00:00:00"
            end: "2016-12-31T23:59:59"
          - symbol: NQ
            chunk: 2
            start: "2016-12-01T00:00:00"
            end: "2017-12-31T23:59:59"
          - symbol: NQ
            chunk: 3
            start: "2017-12-01T00:00:00"
            end: "2018-12-31T23:59:59"
          - symbol: NQ
            chunk: 4
            start: "2018-12-01T00:00:00"
            end: "2019-12-31T23:59:59"
          - symbol: NQ
            chunk: 5
            start: "2019-12-01T00:00:00"
            end: "2020-12-31T23:59:59"
          - symbol: NQ
            chunk: 6
            start: "2020-12-01T00:00:00"
            end: "2021-12-31T23:59:59"
          - symbol: NQ
            chunk: 7
            start: "2021-12-01T00:00:00"
            end: "2022-12-31T23:59:59"
          - symbol: NQ
            chunk: 8
            start: "2022-12-01T00:00:00"
            end: "2023-12-31T23:59:59"
          - symbol: NQ
            chunk: 9
            start: "2023-12-01T00:00:00"
            end: "2024-12-31T23:59:59"
          # YM missing years (2019-2024); YM_Donly_chunk1 covers 2016-2019-03, YM_Donly_chunk4 covers 2024-12 -> 2026-12
          - symbol: YM
            chunk: 1
            start: "2019-01-01T00:00:00"
            end: "2019-12-31T23:59:59"
          - symbol: YM
            chunk: 2
            start: "2019-12-01T00:00:00"
            end: "2020-12-31T23:59:59"
          - symbol: YM
            chunk: 3
            start: "2020-12-01T00:00:00"
            end: "2021-12-31T23:59:59"
          - symbol: YM
            chunk: 4
            start: "2021-12-01T00:00:00"
            end: "2022-12-31T23:59:59"
          - symbol: YM
            chunk: 5
            start: "2022-12-01T00:00:00"
            end: "2023-12-31T23:59:59"
          - symbol: YM
            chunk: 6
            start: "2023-12-01T00:00:00"
            end: "2024-12-31T23:59:59"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install numpy
        run: pip install numpy

      - name: Run D-only backtest chunk
        run: |
          python3 backtests/test_context_variants.py D_only \
            --symbol "${{ matrix.symbol }}" \
            --start "${{ matrix.start }}" \
            --end "${{ matrix.end }}"
          mv backtests/results/context_variants/${{ matrix.symbol }}_D_only_*.json \
            backtests/results/context_variants/${{ matrix.symbol }}_Donly_retry${{ matrix.chunk }}_result.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.symbol }}_Donly_retry${{ matrix.chunk }}
          path: backtests/results/context_variants/${{ matrix.symbol }}_Donly_retry${{ matrix.chunk }}_result.json
          if-no-files-found: error
